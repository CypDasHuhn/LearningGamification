openapi: 3.0.3
info:
  title: Learning Gamification API
  version: 0.0.1
  description: |
    OpenAPI documentation generated from the current Ktor routes and DTOs.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Demo
  - name: Auth
  - name: Themes
  - name: Question Sets
  - name: Questions
  - name: Leaderboard
security:
  - bearerAuth: []
paths:
  /:
    get:
      tags: [Demo]
      summary: Health/demo endpoint
      description: Returns a plain text hello message.
      security: []
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: Hello World!

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /themes:
    get:
      tags: [Themes]
      summary: Get all themes
      responses:
        "200":
          description: List of themes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThemeResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /themes/{themeId}/question-sets:
    get:
      tags: [Themes]
      summary: Get question sets for a theme
      parameters:
        - in: path
          name: themeId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: List of question sets for the theme
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThemeQuestionSetResponse"
        "400":
          description: Invalid themeId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Theme not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /question-sets/{questionSetId}/questions:
    get:
      tags: [Question Sets]
      summary: Get question summaries for a question set
      parameters:
        - in: path
          name: questionSetId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: List of questions in the set
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionSummaryResponse"
        "400":
          description: Invalid questionSetId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Question set not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /questions:
    get:
      tags: [Questions]
      summary: Get questions
      description: Returns all questions, or questions filtered by questionSetId.
      parameters:
        - in: query
          name: questionSetId
          required: false
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionResponse"
        "400":
          description: Invalid questionSetId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /questions/{questionId}/answers:
    get:
      tags: [Questions]
      summary: Get answer options for a question
      parameters:
        - in: path
          name: questionId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Answers for the question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionAnswersResponse"
        "400":
          description: Invalid questionId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Question not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /questions/{questionId}/answer:
    post:
      tags: [Questions]
      summary: Submit an answer for a question
      parameters:
        - in: path
          name: questionId
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerRequest"
      responses:
        "200":
          description: Submission evaluated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitAnswerResponse"
        "400":
          description: Invalid input or request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Question not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /questions/{questionId}/submit:
    post:
      tags: [Questions]
      summary: Submit an answer for a question (alias)
      description: Alias endpoint with identical behavior to /questions/{questionId}/answer.
      parameters:
        - in: path
          name: questionId
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerRequest"
      responses:
        "200":
          description: Submission evaluated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitAnswerResponse"
        "400":
          description: Invalid input or request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Question not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard:
    get:
      tags: [Leaderboard]
      summary: Get leaderboard rankings
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
      responses:
        "200":
          description: Ranked leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntryResponse"
        "400":
          description: Invalid limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    QuestionType:
      type: string
      enum: [MC, TF, GAP]

    AuthRequest:
      type: object
      required: [userName, password]
      properties:
        userName:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      required: [token, userId, userName]
      properties:
        token:
          type: string
        userId:
          type: integer
          format: int32
        userName:
          type: string

    UserResponse:
      type: object
      required: [userId, userName]
      properties:
        userId:
          type: integer
          format: int32
        userName:
          type: string

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ThemeResponse:
      type: object
      required: [themeId, name, questionCount]
      properties:
        themeId:
          type: integer
          format: int32
        name:
          type: string
        description:
          type: string
          nullable: true
        questionCount:
          type: integer
          format: int32

    ThemeQuestionSetResponse:
      type: object
      required: [questionSetId, title, teamId, questionCount]
      properties:
        questionSetId:
          type: integer
          format: int32
        title:
          type: string
        teamId:
          type: integer
          format: int32
        questionCount:
          type: integer
          format: int32

    McAnswerResponse:
      type: object
      required: [answerId, optionText, optionOrder]
      properties:
        answerId:
          type: integer
          format: int32
        optionText:
          type: string
        optionOrder:
          type: integer
          format: int32

    GapOptionResponse:
      type: object
      required: [gapOptionId, optionText, optionOrder]
      properties:
        gapOptionId:
          type: integer
          format: int32
        optionText:
          type: string
        optionOrder:
          type: integer
          format: int32

    GapFieldResponse:
      type: object
      required: [gapId, gapIndex, options]
      properties:
        gapId:
          type: integer
          format: int32
        gapIndex:
          type: integer
          format: int32
        options:
          type: array
          items:
            $ref: "#/components/schemas/GapOptionResponse"

    QuestionSummaryResponse:
      type: object
      required: [questionId, questionType, allowsMultiple, completed]
      properties:
        questionId:
          type: integer
          format: int32
        questionType:
          $ref: "#/components/schemas/QuestionType"
        startText:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        endText:
          type: string
          nullable: true
        allowsMultiple:
          type: boolean
        completed:
          type: boolean

    QuestionResponse:
      type: object
      required:
        [
          questionId,
          questionSetId,
          questionType,
          allowsMultiple,
          completed,
          mcAnswers,
          gapFields,
        ]
      properties:
        questionId:
          type: integer
          format: int32
        questionSetId:
          type: integer
          format: int32
        questionType:
          $ref: "#/components/schemas/QuestionType"
        startText:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        endText:
          type: string
          nullable: true
        allowsMultiple:
          type: boolean
        completed:
          type: boolean
        mcAnswers:
          type: array
          items:
            $ref: "#/components/schemas/McAnswerResponse"
        gapFields:
          type: array
          items:
            $ref: "#/components/schemas/GapFieldResponse"

    QuestionAnswersResponse:
      type: object
      required: [questionId, questionType, allowsMultiple, mcAnswers, gapFields]
      properties:
        questionId:
          type: integer
          format: int32
        questionType:
          $ref: "#/components/schemas/QuestionType"
        allowsMultiple:
          type: boolean
        mcAnswers:
          type: array
          items:
            $ref: "#/components/schemas/McAnswerResponse"
        gapFields:
          type: array
          items:
            $ref: "#/components/schemas/GapFieldResponse"

    GapAnswerInput:
      type: object
      required: [gapId, selectedOptionId]
      properties:
        gapId:
          type: integer
          format: int32
        selectedOptionId:
          type: integer
          format: int32

    SubmitAnswerRequest:
      type: object
      properties:
        selectedAnswerIds:
          type: array
          items:
            type: integer
            format: int32
          default: []
        gapAnswers:
          type: array
          items:
            $ref: "#/components/schemas/GapAnswerInput"
          default: []

    SubmitAnswerResponse:
      type: object
      required: [questionId, questionType, isCorrect, awardedPoints, completed]
      properties:
        questionId:
          type: integer
          format: int32
        questionType:
          $ref: "#/components/schemas/QuestionType"
        isCorrect:
          type: boolean
        awardedPoints:
          type: integer
          format: int32
        completed:
          type: boolean

    LeaderboardEntryResponse:
      type: object
      required:
        [rank, userId, userName, points, completedQuestions, currentUser]
      properties:
        rank:
          type: integer
          format: int32
        userId:
          type: integer
          format: int32
        userName:
          type: string
        points:
          type: integer
          format: int32
        completedQuestions:
          type: integer
          format: int32
        lastCompletedAt:
          type: integer
          format: int64
          nullable: true
        currentUser:
          type: boolean
