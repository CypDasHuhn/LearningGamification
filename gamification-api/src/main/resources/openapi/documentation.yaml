openapi: 3.0.3
info:
  title: Learning Gamification API
  version: 1.0.0
  description: OpenAPI documentation for the currently implemented routes.
servers:
  - url: http://localhost:8080
paths:
  /:
    get:
      summary: Health/root endpoint
      operationId: getRoot
      responses:
        "200":
          description: Returns a simple status text.
          content:
            text/plain:
              schema:
                type: string
                example: Hello World!
  /auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: User created and logged in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      summary: Login with username and password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Successful login.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      summary: Get the currently authenticated user
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Missing/invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UUID
  schemas:
    AuthRequest:
      type: object
      required:
        - userName
        - password
      properties:
        userName:
          type: string
          example: testuser
        password:
          type: string
          minLength: 8
          example: strongpass123
    AuthResponse:
      type: object
      required:
        - token
        - userId
        - userName
      properties:
        token:
          type: string
          example: 14f40f7c-c19e-4f08-b320-8188c0ef8f33
        userId:
          type: integer
          format: int32
          example: 1
        userName:
          type: string
          example: testuser
    UserResponse:
      type: object
      required:
        - userId
        - userName
      properties:
        userId:
          type: integer
          format: int32
          example: 1
        userName:
          type: string
          example: testuser
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Invalid credentials
